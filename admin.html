<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>奄美イベントカレンダー | 管理画面</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 15px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1, h2 {
      color: #2c3e50;
      text-align: center;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #555;
    }
    input[type="text"], input[type="date"], input[type="time"], input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
      outline: none;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      border-color: #2b7a9e;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #2b7a9e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background-color: #1d5670; }
    
    /* アプリ統一エラーメッセージのスタイリング */
    .error-message {
      color: #e63946;
      background-color: #fff5f5;
      border: 1px solid #ffcccc;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none; /* 初期は非表示 */
    }
    
    .success-message {
      color: #2a9d8f;
      background-color: #f0fbf9;
      border: 1px solid #cceee9;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none;
    }

    /* 【新規】パスコード誤入力時の細かく短い横揺れアニメーション */
    .shake {
      animation: shake-animation 0.4s ease-in-out;
      border: 2px solid #e63946 !important; /* 枠線を赤く */
    }

    @keyframes shake-animation {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    /* タイマー表示用ステータスバー */
    .timer-bar {
      background-color: #e2ebee;
      color: #2b7a9e;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .danger-btn {
      background-color: #e63946;
      padding: 6px 12px;
      width: auto;
      font-size: 0.85rem;
    }
    .danger-btn:hover { background-color: #c92a3a; }
    
    .event-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    
    /* 表示切り替え用エリア */
    #adminContent { display: none; }
    #authCard { display: block; }
  </style>
</head>
<body>
<div class="container">

  <h1>⚙️ 運営管理者ポータル</h1>

  <div id="appError" class="error-message"></div>
  <div id="appSuccess" class="success-message"></div>

  <div class="card" id="authCard">
    <h2>🔑 セキュリティ認証</h2>
    <p style="font-size:0.85rem; color:#666; text-align:center; margin-top:-10px;">安全のため、1353を入力してください</p>
    <div class="form-group">
      <input type="password" id="passInput" placeholder="4桁のパスコードを入力" maxlength="4" pattern="\d*">
    </div>
    <button onclick="verifyAdminCode()">ロック解除</button>
  </div>

  <div id="adminContent">
    
    <div class="timer-bar">
      <span>🔐 セキュリティ維持モード作動中</span>
      <span id="countdownDisplay">自動ロックまで: 15:00</span>
    </div>
    
    <div class="card">
      <h2>📅 新規イベントの追加</h2>
      <div class="form-group"><label>イベント名</label><input type="text" id="addTitle"></div>
      <div class="form-group"><label>開催日</label><input type="date" id="addDate"></div>
      <div class="form-group"><label>開始時刻</label><input type="text" id="addTime" placeholder="例: 13:00"></div>
      <div class="form-group"><label>開催場所</label><input type="text" id="addLocation"></div>
      <div class="form-group"><label>住所</label><input type="text" id="addAddress"></div>
      <div class="form-group"><label>運営主体</label><input type="text" id="addOrganizer"></div>
      <div class="form-group"><label>詳細リンク</label><input type="text" id="addLink" placeholder="https://..."></div>
      <div class="form-group"><label>備考</label><input type="text" id="addRemark"></div>
      <button onclick="submitNewEvent()" style="background-color: #2a9d8f;">✨ この内容でイベントを登録</button>
    </div>

    <div class="card">
      <h2>🗑️ 掲載中イベントの管理 (非表示設定)</h2>
      <div id="managementEventList">読み込み中...</div>
    </div>

  </div>
</div>

<script>
  // 【重要】ご自身のGASウェブアプリのURL（/execで終わるもの）を貼り付けてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwbQYHy4tXJXPo7G1FimintcsiIzwLf1q2G0e0-jM3_NbMTaf96-sJ6I3KW0UD7OHSfUQ/exec";

  // 要件定義で指定されたパスコード
  const CORRECT_PASSCODE = "1353";
  
  let lockTimer = null;
  let countdownTimer = null;
  let timeLeft = 15 * 60; // 15分（秒換算）

  // 画面を開くたびに強制的にパスコード入力を求める（初期化）
  window.onload = function() {
    document.getElementById('authCard').style.display = 'block';
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('passInput').focus();
    
    // Enterキーでも送信できるようにイベントリスナーを追加
    document.getElementById('passInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyAdminCode();
    });
  };

  /**
   * アプリ統一のカスタム通知（エラー）を表示する関数
   */
  function showAppError(message) {
    const errorDiv = document.getElementById('appError');
    errorDiv.innerText = message;
    errorDiv.style.display = 'block';
    document.getElementById('appSuccess').style.display = 'none';
    
    // スマホ画面の上部にスクロールして視認させる
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /**
   * アプリ統一のカスタム通知（成功）を表示する関数
   */
  function showAppSuccess(message) {
    const successDiv = document.getElementById('appSuccess');
    successDiv.innerText = message;
    successDiv.style.display = 'block';
    document.getElementById('appError').style.display = 'none';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // 5秒後に自動で消す
    setTimeout(() => { successDiv.style.display = 'none'; }, 5000);
  }

  /**
   * パスコードの検証と横揺れアニメーション
   */
  function verifyAdminCode() {
    const inputElement = document.getElementById('passInput');
    const authCard = document.getElementById('authCard');
    const code = inputElement.value;
    
    // メッセージエリアを一旦初期化
    document.getElementById('appError').style.display = 'none';

    if (code === CORRECT_PASSCODE) {
      // 認証成功の挙動
      inputElement.value = '';
      authCard.classList.remove('shake');
      
      // 画面の切り替え
      authCard.style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      
      // イベント一覧のロード
      loadManagementEvents();
      
      // 【ループ機構】15分のタイマーとカウントダウンをリスタート
      startLockTimers();
    } else {
      // 【要件】パスコード間違い時の横揺れアニメーション発動
      authCard.classList.remove('shake');
      void authCard.offsetWidth; // リフレッシュトリックでアニメーションを再トリガー
      authCard.classList.add('shake');
      
      // 【要件】ブラウザの標準alertではなくアプリ統一のエラー表示
      showAppError("❌ パスコードが正しくありません。もう一度入力してください。");
      inputElement.value = '';
      inputElement.focus();
    }
  }

  /**
   * 15分タイマーとカウントダウンの開始・リセット処理
   */
  function startLockTimers() {
    // 既存のタイマーがあれば完全にクリアして多重ループを防ぐ
    if (lockTimer) clearTimeout(lockTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    
    timeLeft = 15 * 60; // 15分にリセット
    updateTimerDisplay();

    // 1. 1秒ごとにカウントダウン表示を更新するループ
    countdownTimer = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        clearInterval(countdownTimer);
      }
    }, 1000);

    // 2. 15分後に自動的に画面をロックするメインタイマー
    lockTimer = setTimeout(() => {
      triggerAutoLock();
    }, 15 * 60 * 1000);
  }

  /**
   * カウントダウンの文字表示を更新 (分:秒)
   */
  function updateTimerDisplay() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    const formattedSeconds = seconds < 10 ? '0' + seconds : seconds;
    document.getElementById('countdownDisplay').innerText = `自動ロックまで: ${minutes}:${formattedSeconds}`;
  }

  /**
   * 15分経過時の自動ロック発動処理
   */
  function triggerAutoLock() {
    // 全タイマーをクリア
    if (lockTimer) clearTimeout(lockTimer);
    if (countdownTimer) clearInterval(countdownTimer);

    // 画面を認証状態に戻す
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('authCard').style.display = 'block';
    
    document.getElementById('passInput').value = '';
    showAppError("🔒 安全のため、15分が経過したため自動ロックがかかりました。再度パスコードを入力してください。");
    document.getElementById('passInput').focus();
  }
  function loadManagementEvents() {
    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getEvents' })
    })
    .then(res => res.json())
    .then(events => {
      const listDiv = document.getElementById('managementEventList');
      listDiv.innerHTML = '';
      if(events.length === 0) { listDiv.innerHTML = '現在掲載中のイベントはありません。'; return; }
      
      events.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'event-list-item';
        item.innerHTML = `
          <div><strong>${ev.date}</strong> - ${ev.title}</div>
          <button class="danger-btn" onclick="hideEvent('${ev.eventId}')">非表示</button>
        `;
        listDiv.appendChild(item);
      });
    })
    .catch(err => showAppError("データ取得に失敗しました。接続を確認してください。"));
  }
  function submitNewEvent() {
    const title = document.getElementById('addTitle').value;
    const date = document.getElementById('addDate').value;
    if(!title || !date) { showAppError("⚠️ イベント名と開催日は必須項目です。"); return; }

    const payload = {
      action: 'addEvent',
      password: "amami_secret_2026",
      title: title,
      date: date.replace(/-/g, '/'),
      time: document.getElementById('addTime').value,
      location: document.getElementById('addLocation').value,
      address: document.getElementById('addAddress').value,
      organizer: document.getElementById('addOrganizer').value,
      link: document.getElementById('addLink').value,
      remark: document.getElementById('addRemark').value
    };

    fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        showAppSuccess("🎉 イベントをスプレッドシートに正常に登録しました！");
        ['addTitle','addDate','addTime','addLocation','addAddress','addOrganizer','addLink','addRemark'].forEach(id => document.getElementById(id).value = '');
        loadManagementEvents();
        startLockTimers();
      } else { 
        showAppError("❌ 登録エラーが発生しました。GASの設定を確認してください。"); 
      }
    })
    .catch(err => showAppError("通信エラーが発生しました。イベントを登録できません。"));
  }
  function hideEvent(eventId) {
    if(!confirm("このイベントをサイト上から非表示にしますか？")) return;
    
    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'hideEvent', eventId: eventId, password: "amami_secret_2026" })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        showAppSuccess("🗑️ イベントをサイト上から非表示に設定しました。");
        loadManagementEvents();
        // 操作があったため、15分タイマーをリスタート
        startLockTimers();
      } else { 
        showAppError("❌ 非表示処理中にエラーが発生しました。"); 
      }
    })
    .catch(err => showAppError("通信エラーが発生しました。処理を実行できません。"));
  }
</script>
</body>
</html>
